name: feature-flags
description: Run Rust CI with an explicit Cargo feature.
source_path: test-project-with-features
inputs:
  project_path: test-project-with-features
  features: shout
  skip_sast: "true"
  skip_sca: "true"
  skip_release: "true"
  skip_versioning: "true"
  skip_reintegration: "true"
expect:
  log_path: pipery.jsonl
  success_values: [success, passed, ok, succeeded]
  required_fields:
    - name: event
      value: build
