name: 'Pipery Rust CI'
description: 'CI pipeline for Rust: SAST, SCA, lint, build, test, versioning, packaging, release, reintegration'
inputs:
  project_path:
    description: 'Path to the project source tree the action should operate on.'
    required: false
    default: '.'
  config_file:
    description: 'Path to Pipery config file.'
    required: false
    default: '.pipery/config.yaml'
  rust_toolchain:
    description: 'Rust toolchain to use (e.g. stable, nightly, 1.75).'
    required: false
    default: 'stable'
  tests_path:
    description: 'Test filter pattern passed to cargo test.'
    required: false
    default: ''
  features:
    description: 'Cargo features to enable (comma-separated).'
    required: false
    default: ''
  target:
    description: 'Cargo target triple (e.g. x86_64-unknown-linux-musl).'
    required: false
    default: ''
  github_token:
    description: 'GitHub token for release and reintegration steps.'
    required: false
    default: ''
  version_bump:
    description: 'Version bump type: patch, minor, or major.'
    required: false
    default: 'patch'
  log_file:
    description: 'Path to the JSONL log file written during the run.'
    required: false
    default: 'pipery.jsonl'
  target_branch:
    description: 'Target branch for reintegration.'
    required: false
    default: 'main'
  crates_token:
    description: 'crates.io API token for publishing.'
    required: false
    default: ''
  skip_sast:
    description: 'Skip SAST step.'
    required: false
    default: 'false'
  skip_sca:
    description: 'Skip SCA step.'
    required: false
    default: 'false'
  skip_lint:
    description: 'Skip lint step.'
    required: false
    default: 'false'
  skip_build:
    description: 'Skip build step.'
    required: false
    default: 'false'
  skip_test:
    description: 'Skip test step.'
    required: false
    default: 'false'
  skip_versioning:
    description: 'Skip versioning step.'
    required: false
    default: 'false'
  skip_packaging:
    description: 'Skip packaging step.'
    required: false
    default: 'false'
  skip_release:
    description: 'Skip release step.'
    required: false
    default: 'false'
  skip_reintegration:
    description: 'Skip reintegration step.'
    required: false
    default: 'false'
runs:
  using: composite
  steps:
    - id: main
      shell: bash
      run: |
        set -euo pipefail
        project_path="${INPUT_PROJECT_PATH:-${PIPERY_TEST_PROJECT_PATH:-.}}"
        log_path="${PIPERY_LOG_PATH:-pipery.jsonl}"
        if [ ! -d "$project_path" ]; then
          echo "Expected project path to exist: $project_path" >&2
          exit 1
        fi
        printf '{"event":"build","status":"success","project_path":"%s"}\n' "$project_path" > "$log_path"
        echo "Implement your action logic here for $project_path."
branding:
  icon: package
  color: blue
